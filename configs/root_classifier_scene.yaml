experiment:
  name: root_path_scene_classifier_sdf
  output_dir: outputs/root_path_scene_classifier_sdf

data:
  cache_dir: lingo_smplx_cache
  scene_dir: LINGO/dataset/dataset/Scene
  max_frames: 196
  use_scene_sdf: true

negative_sampling:
  positive_ratio: 0.5
  modes:
    - shift
    - wrong_goal
    - jitter
    - wrong_heading
    - reverse_heading
    - path_shuffle
    - scene_collision

model:
  checkpoint: Kimodo-SMPLX-RP-v1
  input_dim: 20
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  dropout: 0.1

training:
  batch_size: 64
  num_epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-4
  max_grad_norm: 1.0
  num_workers: 4
  gpu: 0
