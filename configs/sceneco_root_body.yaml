# SceneCo Root+Body Configuration (Chapter 11 — experiment B)
# Train SceneCo cross-attention in both root_model and body_model

pretrained_model: "Kimodo-SOMA-RP-v1.1"
checkpoint_dir: "models/Kimodo-SOMA-RP-v1.1"
output_dir: "kimodo_scene_project/outputs/root_body_sceneco"

data:
  data_root: "LINGO/dataset"
  cache_dir: "kimodo/kimodo_sceneco/cached_data"
  voxel_size: [64, 64, 64]
  max_frames: 196
  min_frames: 40
  fps: 30
  train_ratio: 0.9
  scene_dropout: 0.1
  text_dropout: 0.1

voxel_vit:
  input_size: [64, 64, 64]
  patch_size: [8, 8, 8]
  in_channels: 1
  d_model: 256
  num_heads: 4
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  embed_dim: 512
  out_dim: 1024

sceneco:
  use_in_root_model: true
  use_in_body_model: true
  d_model: 1024
  scene_feat_dim: 256
  nhead: 8
  dropout: 0.1

training:
  precision: bf16
  freeze_pretrained: true
  num_base_steps: 1000
  batch_size: 4
  total_steps: 200000
  warmup_steps: 5000
  lr: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  prior_weight: 0.5
  scene_dropout: 0.1
  text_dropout: 0.1
  accum_steps: 1
  device: "cuda"
  seed: 42
  log_interval: 50
  val_interval: 500
  val_max_batches: 10
  num_workers: 4

experiment:
  name: "root_body_sceneco"
  gpu_ids: [4, 5, 6, 7]
  description: "SceneCo in both root_model and body_model (full experiment)"
