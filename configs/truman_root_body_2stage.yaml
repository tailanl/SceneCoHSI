# TRUMAN Two-Stage SceneCo Configuration (Dual ViT, Root → Full Body)
# Stage 1: Train SceneCo in root_model only (root trajectory prediction)
# Stage 2: Load Stage 1 checkpoint, add SceneCo in body_model, train full motion
# Both stages use TRUMAN format directly (NO SOMA conversion), dual ViT

pretrained_model: "Kimodo-SOMA-RP-v1.1"
checkpoint_dir: "models/Kimodo-SOMA-RP-v1.1"

data:
  data_root: "TRUMAN"
  cache_dir: "kimodo/kimodo_sceneco/cached_data_truman"
  voxel_size: [64, 64, 64]
  max_frames: 196
  min_frames: 40
  fps: 30
  train_ratio: 0.9
  scene_dropout: 0.1
  text_dropout: 0.1

voxel_vit:
  input_size: [64, 64, 64]
  patch_size: [8, 8, 8]
  in_channels: 1
  d_model: 256
  num_heads: 4
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  embed_dim: 512
  out_dim: 1024

experiment:
  name: "truman_root_body_2stage"
  description: "TRUMAN two-stage: Stage1 root_only → Stage2 root+body, dual ViT, no SOMA"
