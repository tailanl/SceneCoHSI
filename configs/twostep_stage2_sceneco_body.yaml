# Two-Step Training: Stage 2 — SceneCo in body denoiser, based on Stage1
#
# Key design:
#   - Load Stage1 checkpoint (TrajCo in root_model, already trained)
#   - Add SceneCo to body_model (new, trainable)
#   - TrajCo in root_model frozen from Stage1
#   - GT local_root replaces root model prediction (root model bypassed)
#   - Only body features contribute to loss (root loss zeroed)
#   - Text features from cache (text_feat added to lingo_smplx_cache)
#
# Based on SMPLX pretrained Kimodo + Stage1 TrajCo checkpoint
# Dataset: lingo_smplx_cache (full motion features)

pretrained_model: "Kimodo-SMPLX-RP-v1"
checkpoint_dir: "models"
output_dir: "kimodo_scene_project/outputs/twostep_stage2_sceneco_body"

# Path to Stage1 checkpoint (will be set when launching training)
stage1_checkpoint: "kimodo_scene_project/outputs/twostep_stage1_trajco_root/checkpoints/best_checkpoint.pt"

data:
  data_root: "LINGO/dataset"
  cache_dir: "lingo_smplx_cache"
  voxel_size: [64, 64, 64]
  max_frames: 196
  min_frames: 40
  fps: 30
  train_ratio: 0.9
  scene_dropout: 0.0
  text_dropout: 0.1
  root_trajectory_data: false
  no_soma_conversion: true

voxel_vit:
  input_size: [64, 64, 64]
  patch_size: [8, 8, 8]
  in_channels: 1
  d_model: 256
  num_heads: 4
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  embed_dim: 512
  out_dim: 1024

sceneco:
  use_in_root_model: false
  use_in_body_model: true
  d_model: 1024
  scene_feat_dim: 256
  nhead: 8
  dropout: 0.1
  use_dual_vit: false
  root_voxel_mode: full

trajco:
  use_trajco: false
  use_trajco_root: true
  use_trajco_body: false
  traj_dim: 5
  trajco_dropout: 0.1
  traj_loss_weight: 0.0
  traj_dropout: 0.0
  trajco_type: cross_attn

training:
  precision: bf16
  freeze_pretrained: false
  num_base_steps: 1000
  num_epochs: 40
  batch_size: 4
  warmup_steps: 2000
  lr: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  prior_weight: 0.0
  scene_dropout: 0.0
  text_dropout: 0.1
  accum_steps: 1
  device: "cuda"
  seed: 42
  log_interval: 50
  val_interval: 500
  val_max_batches: 10
  num_workers: 4

experiment:
  name: "twostep_stage2_sceneco_body"
  gpu_ids: [0]
  description: "Two-step Stage2: SceneCo in body_model + frozen TrajCo in root_model, GT root, ~1 day training"
