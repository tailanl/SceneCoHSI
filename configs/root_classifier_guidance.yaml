experiment:
  name: root_classifier_guidance
  output_dir: outputs/root_classifier_guidance

model:
  checkpoint: models/Kimodo-SMPLX-RP-v1

root_classifier:
  checkpoint: outputs/root_path_scene_classifier/best.pt
  input_dim: 20
  hidden_dim: 256
  num_layers: 4
  num_heads: 4

classifier_guidance:
  enabled: true
  scale: 0.05
  max_grad_norm: 1.0
  start_step: 0
  end_step: 40
  use_scene: false

hybrid:
  enabled: false
  w_classifier: 1.0
  w_energy: 0.3

generation:
  num_frames: 196
  num_denoising_steps: 50
  cfg_weight: [2.0, 2.0]
  gpu: 0
