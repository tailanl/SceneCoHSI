# Stage 2: SceneCo Root+Body with independent ViT (CaKey trainable)
# Freeze Kimodo backbone only, train dual VoxelViT + SceneCo + CaKey in both root and body.
# Uses independent (separate) VoxelViT for root and body encoders.
# Loads Stage 1 CaKey checkpoint for both root and body.

pretrained_model: "Kimodo-SOMA-RP-v1.1"
checkpoint_dir: "models/Kimodo-SOMA-RP-v1.1"
output_dir: "kimodo_scene_project/outputs/cakey_sceneco_root_body_with_cakey"

stage1_checkpoint: "kimodo_scene_project/outputs/cakey_root_body/checkpoints/best_checkpoint.pt"

data:
  data_root: "LINGO/dataset"
  cache_dir: "kimodo/kimodo_sceneco/cached_data"
  voxel_size: [64, 64, 64]
  max_frames: 196
  min_frames: 40
  fps: 30
  train_ratio: 0.9

voxel_vit:
  input_size: [64, 64, 64]
  patch_size: [8, 8, 8]
  in_channels: 1
  d_model: 256
  num_heads: 4
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  embed_dim: 512
  out_dim: 1024

sceneco:
  use_in_root_model: true
  use_in_body_model: true
  d_model: 1024
  scene_feat_dim: 256
  nhead: 8
  dropout: 0.1
  use_dual_vit: true
  root_voxel_mode: full

cakey:
  use_cakey_root: true
  use_cakey_body: true
  hidden_dim: 2048

training:
  precision: bf16
  freeze_pretrained: true
  freeze_cakey: false
  num_base_steps: 1000
  batch_size: 8
  total_steps: 200000
  warmup_steps: 5000
  lr: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  prior_weight: 0.5
  scene_dropout: 0.1
  accum_steps: 1
  device: "cuda"
  seed: 42
  log_interval: 50
  val_interval: 500
  val_max_batches: 10
  num_workers: 4

experiment:
  name: "cakey_sceneco_root_body_with_cakey"
  gpu_ids: [1]
  description: "Stage 2: trainable CaKey root+body + SceneCo root+body, independent dual ViT"