# Plan D-coarse/noisy: no SceneCo + TrajCo cross root+body + coarse/noisy 5D root
#
# Control experiment for H-coarse/noisy: removes SceneCo entirely to isolate
# whether TrajCo cross-attention itself is robust to coarse/noisy root.
# If H-coarse fails, this tells us whether coarse trajectory is the problem
# or SceneCo body-only interferes with TrajCo root+body.
#
# Based on SMPLX pretrained Kimodo
# Dataset: lingo_smplx_cache (full motion) + lingo_root_trajectory_smplx (root traj)

pretrained_model: "Kimodo-SMPLX-RP-v1"
checkpoint_dir: "models"
output_dir: "kimodo_scene_project/outputs/trajco_cross_root_body_coarse"

data:
  data_root: "LINGO/dataset"
  cache_dir: "lingo_smplx_cache"
  traj_data_dir: "lingo_root_trajectory_smplx"
  voxel_size: [64, 64, 64]
  max_frames: 196
  min_frames: 40
  fps: 30
  train_ratio: 0.9
  scene_dropout: 0.0
  text_dropout: 0.1
  root_trajectory_data: false

voxel_vit:
  input_size: [64, 64, 64]
  patch_size: [8, 8, 8]
  in_channels: 1
  d_model: 256
  num_heads: 4
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  embed_dim: 512
  out_dim: 1024

sceneco:
  use_in_root_model: false
  use_in_body_model: false
  d_model: 1024
  scene_feat_dim: 256
  nhead: 8
  dropout: 0.1
  use_dual_vit: false
  root_voxel_mode: full

trajco:
  use_trajco: false
  use_trajco_root: true
  use_trajco_body: true
  traj_dim: 5
  trajco_dropout: 0.1
  traj_loss_weight: 1.0
  traj_dropout: 0.1
  trajco_type: cross_attn

traj_corruption:
  enabled: true
  waypoint_interval: 30
  pos_noise_std: 0.05
  global_shift_std: 0.05
  heading_noise_std: 0.10
  recompute_heading_from_path: true

training:
  precision: bf16
  freeze_pretrained: true
  num_base_steps: 1000
  num_epochs: 400
  batch_size: 4
  warmup_steps: 5000
  lr: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  prior_weight: 0.5
  scene_dropout: 0.0
  text_dropout: 0.1
  accum_steps: 1
  device: "cuda"
  seed: 42
  log_interval: 50
  val_interval: 500
  val_max_batches: 10
  num_workers: 4

experiment:
  name: "trajco_cross_root_body_coarse"
  gpu_ids: [4]
  description: "Plan D-coarse/noisy: TrajCo cross root+body with planner-like 5D root, no SceneCo"
