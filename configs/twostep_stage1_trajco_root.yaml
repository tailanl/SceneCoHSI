# Two-Step Training: Stage 1 — TrajCo in root denoiser, root-only data
#
# Key design:
#   - TrajCo cross_attn injected into root_model only
#   - No SceneCo (neither root nor body)
#   - Root trajectory dataset (5-dim global_root_features)
#   - Loss only on root dimensions
#   - Text features from cache (lingo_root_trajectory_smplx has text_feat)
#   - Freeze pretrained, only train TrajCo + TrajEncoder
#
# Based on SMPLX pretrained Kimodo
# Dataset: lingo_root_trajectory_smplx

pretrained_model: "Kimodo-SMPLX-RP-v1"
checkpoint_dir: "models"
output_dir: "kimodo_scene_project/outputs/twostep_stage1_trajco_root"

data:
  data_root: "LINGO/dataset"
  cache_dir: "lingo_root_trajectory_smplx"
  traj_data_dir: "lingo_root_trajectory_smplx"
  voxel_size: [64, 64, 64]
  max_frames: 196
  min_frames: 40
  fps: 30
  train_ratio: 0.9
  scene_dropout: 0.0
  text_dropout: 0.1
  root_trajectory_data: true
  no_soma_conversion: true

voxel_vit:
  input_size: [64, 64, 64]
  patch_size: [8, 8, 8]
  in_channels: 1
  d_model: 256
  num_heads: 4
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  embed_dim: 512
  out_dim: 1024

sceneco:
  use_in_root_model: false
  use_in_body_model: false
  d_model: 1024
  scene_feat_dim: 256
  nhead: 8
  dropout: 0.1
  use_dual_vit: false
  root_voxel_mode: full

trajco:
  use_trajco: false
  use_trajco_root: true
  use_trajco_body: false
  traj_dim: 5
  trajco_dropout: 0.1
  traj_loss_weight: 1.0
  traj_dropout: 0.1
  trajco_type: cross_attn

training:
  precision: bf16
  freeze_pretrained: true
  num_base_steps: 1000
  num_epochs: 350
  batch_size: 32
  warmup_steps: 5000
  lr: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  prior_weight: 0.0
  scene_dropout: 0.0
  text_dropout: 0.1
  accum_steps: 2
  device: "cuda"
  seed: 42
  log_interval: 50
  val_interval: 500
  val_max_batches: 10
  num_workers: 4

experiment:
  name: "twostep_stage1_trajco_root"
  gpu_ids: [0]
  description: "Two-step Stage1: TrajCo cross_attn in root_model, root-only data, ~1 day training"
